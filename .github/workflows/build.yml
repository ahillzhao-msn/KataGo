name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential zlib1g-dev libzip-dev opencl-headers ocl-icd-opencl-dev

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          cpp/CMakeCache.txt
          cpp/CMakeFiles
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Configure CMake
      working-directory: cpp
      run: |
        cmake . -DUSE_BACKEND=OPENCL -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS_RELEASE="-s"

    - name: Build
      working-directory: cpp
      run: |
        make -j$(nproc)

    - name: Run tests
      working-directory: cpp
      run: |
        ./katago runtests

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: katago-linux-opencl
        path: cpp/katago
        retention-days: 7

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install zlib libzip opencl-headers
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            cpp/CMakeCache.txt
            cpp/CMakeFiles
            cpp/build.ninja
            cpp/.ninja_deps
            cpp/.ninja_log
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-
      - name: Configure CMake
        working-directory: cpp
        run: |
          cmake . -G Ninja -DUSE_BACKEND=OPENCL -DCMAKE_BUILD_TYPE=Release
      - name: Build
        working-directory: cpp
        run: |
          ninja
      - name: Run tests
        working-directory: cpp
        run: |
          ./katago runtests
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: katago-macos-opencl
          path: cpp/katago
          retention-days: 7

  build-macos-metal:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ninja zlib libzip protobuf abseil

      - name: Capture dependency versions for cache key
        id: dep-versions
        run: |
          echo "versions=$(brew list --versions protobuf abseil | tr '\n' '-')" >> "$GITHUB_OUTPUT"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            cpp/CMakeCache.txt
            cpp/CMakeFiles
            cpp/build.ninja
            cpp/.ninja_deps
            cpp/.ninja_log
          key: ${{ runner.os }}-cmake-metal-${{ steps.dep-versions.outputs.versions }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-metal-${{ steps.dep-versions.outputs.versions }}-

      - name: Configure CMake
        working-directory: cpp
        run: |
          cmake . -G Ninja -DUSE_BACKEND=METAL -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: cpp
        run: |
          ninja

      - name: Run tests
        working-directory: cpp
        run: |
          ./katago runtests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: katago-macos-metal
          path: cpp/katago
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json') }}-opencl
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install zlib:x64-windows libzip:x64-windows opencl:x64-windows

    - name: Configure CMake
      working-directory: cpp
      run: |
        cmake . -G "Visual Studio 17 2022" -A x64 `
          -DUSE_BACKEND=OPENCL `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      working-directory: cpp
      run: |
        cmake --build . --config Release -j 4

    - name: Copy required DLLs
      working-directory: cpp
      run: |
        $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
        Copy-Item "$vcpkgRoot/installed/x64-windows/bin/*.dll" -Destination "Release/"

    - name: Run tests
      working-directory: cpp
      run: |
        Release/katago.exe runtests

    - name: Package Windows release
      working-directory: cpp
      run: |
        Compress-Archive -Path "Release/katago.exe", "Release/*.dll" `
          -DestinationPath "katago-windows-opencl.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: katago-windows-opencl
        path: cpp/katago-windows-opencl.zip
        retention-days: 7

  # ── Create GitHub Release on tag push ────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-macos-metal, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: Rename binaries for release
        run: |
          mkdir -p dist
          # Linux OpenCL
          cp release-assets/katago-linux-opencl/katago dist/katago-linux-opencl
          chmod +x dist/katago-linux-opencl
          # macOS OpenCL
          cp release-assets/katago-macos-opencl/katago dist/katago-macos-opencl
          chmod +x dist/katago-macos-opencl
          # macOS Metal
          cp release-assets/katago-macos-metal/katago dist/katago-macos-metal
          chmod +x dist/katago-macos-metal
          # Windows (zip already includes DLLs)
          cp release-assets/katago-windows-opencl/katago-windows-opencl.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KataGo ${{ github.ref_name }} (KAB2 fork)
          generate_release_notes: true
          files: dist/*
          body: |
            ## KataGo KAB2 Fork — ${{ github.ref_name }}

            Custom fork of [lightvector/KataGo](https://github.com/lightvector/KataGo)
            adding `batch_analysis` for KataRank feature extraction.

            ### Downloads

            | Platform | File | Backend |
            |----------|------|---------|
            | Windows | `katago-windows-opencl.zip` | OpenCL (GPU + CPU) |
            | Linux | `katago-linux-opencl` | OpenCL |
            | macOS | `katago-macos-opencl` | OpenCL |
            | macOS | `katago-macos-metal` | Metal (Apple Silicon) |

            > **CUDA Windows binary**: Not built in CI (requires CUDA runner).
            > If you have a CUDA GPU on Windows, use the CUDA build from
            > local compilation or contact the maintainer for a CUDA binary.

            ### Windows setup

            1. Download `katago-windows-opencl.zip` and extract.
            2. Download a standard KataGo OpenCL config from
               [KataGo releases](https://github.com/lightvector/KataGo/releases)
               or run `katago.exe tuner -model model.bin.gz`.
            3. Replace the stock `katago.exe` in your KataGo OpenCL installation
               with this binary, keeping all other files.

            ### Usage

            See [KataRank README](https://github.com/ahillzhao-msn/katarank#readme)
            for `batch_analysis` usage, KAB2 format, and daemon mode.
